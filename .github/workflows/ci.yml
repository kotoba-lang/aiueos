name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: CLJC contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - name: Test CLJC contract
        run: clojure -M:test
      - name: Babashka smoke
        run: bb test
