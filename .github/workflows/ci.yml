name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bare-metal-uefi:
    name: aiueos UEFI bare-metal smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - name: Install QEMU, OVMF, and GRUB
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf grub-pc-bin grub-efi-amd64-bin xorriso mtools
      - name: Build PE32+ loader and ELF64 kernel
        run: os/aiueos/scripts/build-uefi.sh
      - name: Boot and recover the committed journal (no Linux guest)
        run: os/aiueos/scripts/smoke-qemu-journal-recovery.sh
      - name: Reject a corrupted kernel before ELF parsing
        run: AIUEOS_CORRUPT_KERNEL=1 os/aiueos/scripts/smoke-qemu-uefi.sh
      - name: Reject a corrupted initramfs before kernel handoff
        run: AIUEOS_CORRUPT_INITRAMFS=1 os/aiueos/scripts/smoke-qemu-uefi.sh
      - name: Reject a recovery payload with a bad signature in the kernel policy
        run: AIUEOS_CORRUPT_RECOVERY_SIG=1 os/aiueos/scripts/smoke-qemu-uefi.sh
      - name: Boot the GPT raw disk and El Torito ISO release media
        run: os/aiueos/scripts/smoke-qemu-release-image.sh
      - name: Boot the kernel through QEMU's Multiboot loader (no GRUB)
        run: os/aiueos/scripts/smoke-qemu-multiboot.sh
      - name: Boot the kernel through GRUB via Multiboot2
        run: GRUB_MKRESCUE=grub-mkrescue os/aiueos/scripts/smoke-qemu-grub-multiboot.sh

  test:
    name: CLJC contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
      - name: Test CLJC contract
        run: clojure -M:test
      - name: Lint
        run: clojure -M:lint
      - name: Babashka smoke
        run: bb test

  edn-contracts:
    name: EDN examples and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: latest
      - name: Read EDN examples
        run: |
          bb -e '
          (require (quote [clojure.edn :as edn])
                   (quote [clojure.java.io :as io]))
          (doseq [f (file-seq (io/file "examples"))
                  :when (and (.isFile f)
                             (.endsWith (.getName f) ".edn"))]
            (edn/read-string (slurp f)))
          '
